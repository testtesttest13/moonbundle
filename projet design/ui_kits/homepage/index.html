<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Moonbundles — Homepage UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #0a1628; color: #fff; }
  body { font-family: var(--font-body); }
  * { box-sizing: border-box; }
  a { color: inherit; }
  img { max-width: 100%; }

  .page-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .page-bg .grid {
    position: absolute; inset: 0; opacity: .55;
    background-image: radial-gradient(circle, rgba(255,255,255,.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .root { position: relative; z-index: 1; }

  @keyframes mb-ping {
    0% { transform: scale(.8); opacity: .7; }
    100% { transform: scale(2.4); opacity: 0; }
  }
  @keyframes mb-pulse-glow {
    0%, 100% { opacity: .4; transform: scale(1); }
    50% { opacity: .75; transform: scale(1.06); }
  }
  @keyframes mb-float {
    0%, 100% { transform: translate(var(--x, 0), 0) rotate(var(--r, 0deg)); }
    50% { transform: translate(var(--x, 0), -14px) rotate(var(--r, 0deg)); }
  }

  body::after {
    content: ""; position: fixed; inset: 0; z-index: 60; pointer-events: none; opacity: .025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  @media (max-width: 720px) {
    .hp-nav-links { display: none !important; }
  }
</style>
</head>
<body>
<div class="page-bg"><div class="grid"></div></div>
<div id="root" class="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Navbar.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Features.jsx"></script>
<script type="text/babel" src="Testimonials.jsx"></script>
<script type="text/babel" src="Comparison.jsx"></script>
<script type="text/babel">
const { Navbar, Hero, Features, Testimonials, Comparison, FinalCta, Footer } = window.HP;
function App() {
  return (
    <>
      <Navbar />
      <Hero />
      <Features />
      <Testimonials />
      <Comparison />
      <FinalCta />
      <Footer />
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
