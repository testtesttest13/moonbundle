<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Moonbundles — Lead Magnet UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #0a1628; color: #fff; }
  body { font-family: var(--font-body); min-height: 100vh; }
  * { box-sizing: border-box; }
  a { color: inherit; }

  .page-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .page-bg .orb { position: absolute; border-radius: 50%; filter: blur(120px); animation: mb-pulse-glow 5s ease-in-out infinite; }
  .page-bg .o1 { width: 520px; height: 520px; background: rgba(77,124,255,.12); left: -10%; top: -10%; }
  .page-bg .o2 { width: 360px; height: 360px; background: rgba(124,92,255,.10); right: -10%; top: 40%; animation-delay: 2s; }
  .page-bg .grid {
    position: absolute; inset: 0; opacity: .55;
    background-image: radial-gradient(circle, rgba(255,255,255,.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .page-bg .line { position: absolute; top: 0; bottom: 0; width: 1px; background: linear-gradient(to bottom, transparent, rgba(77,124,255,.12) 40%, transparent); }
  .page-bg .l1 { left: 12%; } .page-bg .l2 { right: 12%; background: linear-gradient(to bottom, transparent, rgba(124,92,255,.12) 40%, transparent); }

  .container { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding-bottom: 40px; }

  @keyframes mb-ping {
    0% { transform: scale(.8); opacity: .7; }
    100% { transform: scale(2.4); opacity: 0; }
  }
  @keyframes mb-pulse { 50% { opacity: .4; } }
  @keyframes mb-pulse-glow {
    0%, 100% { opacity: .4; transform: scale(1); }
    50% { opacity: .75; transform: scale(1.06); }
  }

  .lm-glass:hover {
    background: rgba(255,255,255,.05) !important;
    border-color: rgba(255,255,255,.12) !important;
  }

  /* fixed grain overlay */
  body::after {
    content: ""; position: fixed; inset: 0; z-index: 60; pointer-events: none; opacity: .025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
</style>
</head>
<body>
<div class="page-bg">
  <div class="grid"></div>
  <div class="line l1"></div>
  <div class="line l2"></div>
  <div class="orb o1"></div>
  <div class="orb o2"></div>
</div>

<div id="root" class="container"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Steps.jsx"></script>
<script type="text/babel" src="CtaBox.jsx"></script>
<script type="text/babel" src="Extras.jsx"></script>
<script type="text/babel">
const { Header, Hero, Steps, CtaBox, WhatsAppCard, Footer, StickyMobileCta } = window.LM;

function App() {
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 400);
    window.addEventListener("scroll", onScroll);
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  return (
    <>
      <Header />
      <Hero />
      <div style={{ marginTop: 14 }}>
        <Steps />
      </div>
      <CtaBox />
      <WhatsAppCard />
      <Footer />
      <StickyMobileCta visible={scrolled} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
