<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Progress & Score</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--navy-900);color:#fff;font-family:var(--font-body);}
  .wrap{padding:22px 24px;display:grid;grid-template-columns:1.4fr 1fr;gap:22px;align-items:center;}
  .lbl{font-size:11px;color:#94a3b8;display:flex;justify-content:space-between;margin-bottom:8px;}
  .lbl b{color:#4d7cff;}
  .track{height:6px;background:rgba(255,255,255,.06);border-radius:9999px;overflow:hidden;border:1px solid rgba(255,255,255,.04);}
  .fill{height:100%;width:66%;background:linear-gradient(90deg,#4d7cff,#7c5cff);border-radius:9999px;}
  .ring{position:relative;width:130px;height:130px;margin:0 auto;}
  .ring svg{transform:rotate(-90deg);}
  .ring .v{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--font-heading);}
  .ring .v b{font-size:32px;font-weight:700;color:#22c55e;font-variant-numeric:tabular-nums;}
  .ring .v span{font-size:10.5px;color:#94a3b8;text-transform:uppercase;letter-spacing:.12em;margin-top:2px;}
</style></head>
<body class="grain">
<div class="wrap">
  <div>
    <div class="lbl"><span>Ta progression</span><b>4/6</b></div>
    <div class="track"><div class="fill"></div></div>
    <div style="height:18px"></div>
    <div class="lbl"><span>Onboarding</span><b>Étape 3/5</b></div>
    <div class="track"><div class="fill" style="width:60%"></div></div>
  </div>
  <div class="ring">
    <svg width="130" height="130" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="44" stroke="rgba(255,255,255,.05)" stroke-width="8" fill="none"/>
      <circle cx="50" cy="50" r="44" stroke="#22c55e" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="276.5" stroke-dashoffset="83"/>
    </svg>
    <div class="v"><b>7/10</b><span>Score CRO</span></div>
  </div>
</div>
</body></html>
