<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Moonbundles — Semantic Colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--navy-900);color:var(--text-primary);font-family:var(--font-body);}
  .wrap{padding:18px 20px;display:grid;grid-template-columns:repeat(6,1fr);gap:12px;}
  .sw{border-radius:14px;border:1px solid var(--border-subtle);overflow:hidden;background:var(--surface);}
  .chip{height:58px;}
  .meta{padding:8px 10px;}
  .name{font-family:var(--font-heading);font-weight:700;font-size:12px;line-height:1.1;}
  .hex{font-family:var(--font-heading);font-variant-numeric:tabular-nums;font-size:10.5px;color:var(--text-muted);margin-top:2px;letter-spacing:.02em;}
</style></head>
<body class="grain">
<div class="wrap">
  <div class="sw"><div class="chip" style="background:#22c55e"></div><div class="meta"><div class="name">success</div><div class="hex">#22C55E</div></div></div>
  <div class="sw"><div class="chip" style="background:#ef4444"></div><div class="meta"><div class="name">danger</div><div class="hex">#EF4444</div></div></div>
  <div class="sw"><div class="chip" style="background:#f59e0b"></div><div class="meta"><div class="name">warning</div><div class="hex">#F59E0B</div></div></div>
  <div class="sw"><div class="chip" style="background:#facc15"></div><div class="meta"><div class="name">rating</div><div class="hex">#FACC15</div></div></div>
  <div class="sw"><div class="chip" style="background:#25d366"></div><div class="meta"><div class="name">whatsapp</div><div class="hex">#25D366</div></div></div>
  <div class="sw"><div class="chip" style="background:#5b8def"></div><div class="meta"><div class="name">blue-light</div><div class="hex">#5B8DEF</div></div></div>
</div>
</body></html>
