<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Moonbundles — Type Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--navy-900);color:var(--text-primary);}
  .wrap{padding:18px 24px;display:flex;flex-direction:column;gap:4px;}
  .row{display:grid;grid-template-columns:120px 1fr;gap:14px;align-items:baseline;padding:6px 0;border-top:1px solid var(--border-subtle);}
  .row:first-child{border-top:none;}
  .lbl{font-family:var(--font-heading);color:var(--blue-accent);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.1em;}
  .spec{color:var(--text-muted);font-size:11px;margin-left:8px;font-variant-numeric:tabular-nums;}
  .s-hero{font-family:var(--font-heading);font-weight:700;font-size:36px;line-height:1.05;letter-spacing:-0.02em;}
  .s-h1{font-family:var(--font-heading);font-weight:700;font-size:28px;line-height:1.1;}
  .s-h2{font-family:var(--font-heading);font-weight:700;font-size:22px;}
  .s-h3{font-family:var(--font-heading);font-weight:700;font-size:18px;}
  .s-body{font-family:var(--font-body);font-size:15px;color:var(--text-secondary);}
  .s-muted{font-family:var(--font-body);font-size:13px;color:var(--text-muted);}
</style></head>
<body class="grain">
<div class="wrap">
  <div class="row"><span class="lbl">Hero</span><span class="s-hero">Augmente ton AOV<span class="spec">48/36 · 700</span></span></div>
  <div class="row"><span class="lbl">H1</span><span class="s-h1">Crée des native ads qui scalent<span class="spec">36/30 · 700</span></span></div>
  <div class="row"><span class="lbl">H2</span><span class="s-h2">Pourquoi Moonbundles ?<span class="spec">30/20 · 700</span></span></div>
  <div class="row"><span class="lbl">H3</span><span class="s-h3">Bundles Fixes<span class="spec">20/18 · 700</span></span></div>
  <div class="row"><span class="lbl">Body</span><span class="s-body">Groupez vos produits, boostez le panier.<span class="spec">16/14 · 400</span></span></div>
  <div class="row"><span class="lbl">Muted</span><span class="s-muted">Sans carte bancaire · Résiliable.<span class="spec">13/12 · 400</span></span></div>
</div>
</body></html>
