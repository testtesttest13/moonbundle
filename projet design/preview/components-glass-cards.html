<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Glass Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--navy-900);color:#fff;font-family:var(--font-body);}
  .wrap{padding:18px 22px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:18px;backdrop-filter:blur(20px);}
  .card h3{font-family:var(--font-heading);font-size:15px;margin:0 0 6px;font-weight:700;}
  .card p{margin:0;color:#94a3b8;font-size:12.5px;line-height:1.55;}
  .num{display:inline-flex;width:28px;height:28px;border-radius:50%;background:#4d7cff;align-items:center;justify-content:center;font-family:var(--font-heading);font-weight:700;font-size:12px;margin-bottom:10px;}
  .icon{width:38px;height:38px;border-radius:12px;background:rgba(77,124,255,.15);color:#4d7cff;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
</style></head>
<body class="grain">
<div class="wrap">
  <div class="card"><div class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg></div><h3>Cart Drawer</h3><p>Un panier latéral qui vend pour vous — upsells intégrés.</p></div>
  <div class="card"><div class="num">1</div><h3>Apprends ton persona</h3><p>19 questions, une fiche complète générée par Claude.</p></div>
</div>
</body></html>
