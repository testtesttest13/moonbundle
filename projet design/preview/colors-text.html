<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Moonbundles — Text on Navy</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--navy-900);color:var(--text-primary);font-family:var(--font-body);}
  .wrap{padding:22px 26px;display:flex;flex-direction:column;gap:10px;}
  .row{display:flex;align-items:center;gap:14px;padding:10px 14px;border-radius:12px;background:var(--surface);border:1px solid var(--border-subtle);}
  .dot{width:14px;height:14px;border-radius:50%;flex:none;}
  .lbl{font-family:var(--font-heading);font-weight:700;font-size:13px;min-width:130px;}
  .hex{font-family:var(--font-heading);font-variant-numeric:tabular-nums;font-size:11px;color:var(--text-muted);min-width:88px;}
  .sample{font-size:13px;}
</style></head>
<body class="grain">
<div class="wrap">
  <div class="row"><span class="dot" style="background:#ffffff"></span><span class="lbl">text-primary</span><span class="hex">#FFFFFF</span><span class="sample" style="color:#ffffff">Boostez votre AOV à chaque étape</span></div>
  <div class="row"><span class="dot" style="background:#e2e8f0"></span><span class="lbl">text-secondary</span><span class="hex">#E2E8F0</span><span class="sample" style="color:#e2e8f0">Configurez vos offres en 5 minutes.</span></div>
  <div class="row"><span class="dot" style="background:#94a3b8"></span><span class="lbl">text-muted</span><span class="hex">#94A3B8</span><span class="sample" style="color:#94a3b8">Sans carte bancaire · Annulable à tout moment</span></div>
  <div class="row"><span class="dot" style="background:#4d7cff"></span><span class="lbl">blue-accent</span><span class="hex">#4D7CFF</span><span class="sample" style="color:#4d7cff;font-weight:600">Configurable depuis ton dashboard.</span></div>
</div>
</body></html>
