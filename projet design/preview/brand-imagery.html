<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Brand — Imagery</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--navy-900);color:#fff;font-family:var(--font-body);}
  .wrap{padding:16px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .card{border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.08);box-shadow:0 12px 40px rgba(0,0,0,.4);display:flex;flex-direction:column;background:var(--navy-800);}
  .card .sq{
    position:relative;aspect-ratio:1/1;width:100%;overflow:hidden;
    background:
      radial-gradient(120% 90% at 50% 0%, rgba(77,124,255,.18), transparent 55%),
      linear-gradient(180deg, #16243f 0%, #0f1a33 100%);
    display:flex;align-items:center;justify-content:center;padding:10%;
  }
  .card .sq::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px);
    background-size:22px 22px;opacity:.7;
  }
  .card img{
    position:relative;display:block;max-width:100%;max-height:100%;
    width:auto;height:auto;object-fit:contain;
    filter:drop-shadow(0 14px 30px rgba(0,0,0,.45));
  }
  .c{padding:10px 12px;font-size:11px;color:#94a3b8;font-weight:500;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(255,255,255,.05);}
  .c b{color:#fff;font-weight:600;font-family:var(--font-heading);font-size:12px;}
  .tag{background:rgba(77,124,255,.1);color:var(--blue-accent);padding:2px 8px;border-radius:9999px;font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;}
</style></head>
<body class="grain">
<div class="wrap">
  <div class="card"><div class="sq"><img src="../assets/fixed-bundle.png" alt=""></div><div class="c"><b>Fixed Bundle</b><span class="tag">AOV</span></div></div>
  <div class="card"><div class="sq"><img src="../assets/cart-drawer.webp" alt=""></div><div class="c"><b>Cart Drawer</b><span class="tag">Upsell</span></div></div>
  <div class="card"><div class="sq"><img src="../assets/one-click-upsell.webp" alt=""></div><div class="c"><b>Post-Purchase</b><span class="tag">1-click</span></div></div>
  <div class="card"><div class="sq"><img src="../assets/quantity-breaks.png" alt=""></div><div class="c"><b>Volume</b><span class="tag">Breaks</span></div></div>
  <div class="card"><div class="sq"><img src="../assets/bundle.webp" alt=""></div><div class="c"><b>Mix & Match</b><span class="tag">Bundle</span></div></div>
  <div class="card"><div class="sq"><img src="../assets/progress-gift.png" alt=""></div><div class="c"><b>Free Gift</b><span class="tag">Progress</span></div></div>
</div>
</body></html>
