<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Moonbundles — Colors — Core Palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--navy-900);color:var(--text-primary);font-family:var(--font-body);}
  .wrap{padding:18px 20px;display:grid;grid-template-columns:repeat(6,1fr);gap:12px;}
  .sw{border-radius:14px;border:1px solid var(--border-subtle);overflow:hidden;background:var(--surface);}
  .chip{height:58px;}
  .meta{padding:8px 10px;}
  .name{font-family:var(--font-heading);font-weight:700;font-size:12px;line-height:1.1;}
  .hex{font-family:var(--font-heading);font-variant-numeric:tabular-nums;font-size:10.5px;color:var(--text-muted);margin-top:2px;letter-spacing:.02em;}
</style></head>
<body class="grain">
<div class="wrap">
  <div class="sw"><div class="chip" style="background:#0a1628"></div><div class="meta"><div class="name">navy-900</div><div class="hex">#0A1628</div></div></div>
  <div class="sw"><div class="chip" style="background:#162044"></div><div class="meta"><div class="name">navy-800</div><div class="hex">#162044</div></div></div>
  <div class="sw"><div class="chip" style="background:#1a2a5e"></div><div class="meta"><div class="name">navy-700</div><div class="hex">#1A2A5E</div></div></div>
  <div class="sw"><div class="chip" style="background:#1e3470"></div><div class="meta"><div class="name">navy-600</div><div class="hex">#1E3470</div></div></div>
  <div class="sw"><div class="chip" style="background:#4d7cff"></div><div class="meta"><div class="name">blue-accent</div><div class="hex">#4D7CFF</div></div></div>
  <div class="sw"><div class="chip" style="background:#7c5cff"></div><div class="meta"><div class="name">violet-accent</div><div class="hex">#7C5CFF</div></div></div>
</div>
</body></html>
