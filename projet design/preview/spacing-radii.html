<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--navy-900);color:var(--text-primary);font-family:var(--font-body);}
  .wrap{padding:20px 24px;display:grid;grid-template-columns:repeat(6,1fr);gap:12px;}
  .box{aspect-ratio:1/1;background:var(--surface);border:1px solid var(--border-subtle);display:flex;align-items:flex-end;padding:8px;}
  .lbl{font-family:var(--font-heading);font-weight:700;font-size:10.5px;color:#fff;}
  .lbl b{color:var(--blue-accent);display:block;}
</style></head>
<body class="grain">
<div class="wrap">
  <div class="box" style="border-radius:8px"><div class="lbl"><b>r-sm</b>8px</div></div>
  <div class="box" style="border-radius:12px"><div class="lbl"><b>r-md</b>12px</div></div>
  <div class="box" style="border-radius:16px"><div class="lbl"><b>r-lg</b>16px</div></div>
  <div class="box" style="border-radius:20px"><div class="lbl"><b>r-xl</b>20px</div></div>
  <div class="box" style="border-radius:24px"><div class="lbl"><b>r-2xl</b>24px</div></div>
  <div class="box" style="border-radius:9999px"><div class="lbl"><b>r-full</b>pill</div></div>
</div>
</body></html>
