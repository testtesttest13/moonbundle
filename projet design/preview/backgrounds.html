<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Backgrounds</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--navy-900);font-family:var(--font-body);color:#fff;}
  .wrap{padding:18px 20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  .card{height:150px;border-radius:14px;border:1px solid var(--border-subtle);overflow:hidden;position:relative;display:flex;align-items:flex-end;padding:10px;}
  .t{font-family:var(--font-heading);font-weight:700;font-size:11px;position:relative;z-index:2;background:rgba(10,22,40,.5);padding:4px 8px;border-radius:6px;}
  .c1{background:#0a1628;}
  .c1::before{content:"";position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.08) 1px,transparent 1px);background-size:20px 20px;}
  .c2{background:linear-gradient(to bottom right,#0a1628,#162044 60%,#1a2a5e);}
  .c3{background:#0a1628;}
  .c3::before{content:"";position:absolute;inset:0;opacity:.4;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}
  .orb{position:absolute;border-radius:50%;filter:blur(40px);}
  .c4{background:#0a1628;}
  .c4 .o1{width:120px;height:120px;background:rgba(77,124,255,.4);left:-20px;top:10px;}
  .c4 .o2{width:100px;height:100px;background:rgba(124,92,255,.35);right:-10px;bottom:-10px;}
</style></head>
<body class="grain">
<div class="wrap">
  <div class="card c1"><span class="t">dot-grid</span></div>
  <div class="card c2"><span class="t">page gradient</span></div>
  <div class="card c3"><span class="t">grain overlay</span></div>
  <div class="card c4"><div class="orb o1"></div><div class="orb o2"></div><span class="t">blurred orbs</span></div>
</div>
</body></html>
