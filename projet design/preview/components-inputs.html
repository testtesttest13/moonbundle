<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--navy-900);color:#fff;font-family:var(--font-body);}
  .wrap{padding:20px 24px;display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start;}
  .big{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:16px 18px;text-align:center;font-family:var(--font-heading);font-weight:700;font-size:26px;color:#fff;font-variant-numeric:tabular-nums;width:100%;box-sizing:border-box;}
  .lbl{font-size:10px;font-weight:600;color:#4d7cff;text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px;display:block;}
  .text{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 14px;color:#fff;width:100%;box-sizing:border-box;font-size:13px;}
  .text::placeholder{color:rgba(148,163,184,.5);}
  .text:focus{border-color:rgba(77,124,255,.5);outline:none;background:rgba(255,255,255,.06);}
  .chk{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);}
  .box{width:18px;height:18px;border-radius:5px;border:2px solid #4d7cff;background:#4d7cff;display:flex;align-items:center;justify-content:center;}
</style></head>
<body class="grain">
<div class="wrap">
  <div><span class="lbl">AOV actuel</span><input class="big" value="€82" /></div>
  <div><span class="lbl">Email</span><input class="text" placeholder="toi@tastore.com" /></div>
  <div><span class="lbl">Checkbox done</span><div class="chk"><span class="box"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span><span style="color:#4d7cff;font-weight:600;font-size:12.5px">Travaille ton copywriting</span></div></div>
  <div><span class="lbl">Checkbox idle</span><div class="chk"><span class="box" style="background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.15)"></span><span style="color:#fff;font-weight:600;font-size:12.5px">A/B teste tes offres</span></div></div>
</div>
</body></html>
