<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Moonbundles — Type Specimen</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--navy-900);color:var(--text-primary);}
  .wrap{padding:20px 24px;}
  .hero{font-family:var(--font-heading);font-weight:900;font-size:40px;line-height:1.05;letter-spacing:-0.02em;}
  .hero .g{background:linear-gradient(90deg,#4d7cff,#7c5cff,#5b8def);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{font-family:var(--font-body);color:var(--text-muted);font-size:14px;margin-top:10px;max-width:440px;line-height:1.55;}
  .meta{margin-top:14px;font-family:var(--font-body);color:var(--text-muted);font-size:11px;display:flex;gap:16px;}
  .meta b{color:var(--blue-accent);font-weight:600;}
</style></head>
<body class="grain">
<div class="wrap">
  <div class="hero">Boostez votre AOV <span class="g">à chaque étape</span></div>
  <div class="sub">L'app Shopify tout-en-un pour les Bundles, Cart Upsell & Post-Achat. Adorée par 1 200+ marchands.</div>
  <div class="meta"><span><b>Heading</b> Satoshi 900/700</span><span><b>Body</b> Plus Jakarta Sans 400</span><span><b>Highlight</b> gradient clip</span></div>
</div>
</body></html>
