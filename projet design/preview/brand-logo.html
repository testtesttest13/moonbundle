<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Brand — Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--navy-900);color:#fff;font-family:var(--font-body);}
  .wrap{padding:22px 24px;display:flex;flex-direction:column;gap:16px;}
  .row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:14px;background:var(--surface);border:1px solid var(--border-subtle);}
  .row img{height:40px;width:40px;object-fit:contain;}
  .mark{font-family:var(--font-heading);font-weight:700;font-size:20px;letter-spacing:-0.01em;}
  .tag{margin-left:auto;font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.12em;}
  .inv{background:#fff;}
  .inv .mark{color:#0a1628;}
</style></head>
<body class="grain">
<div class="wrap">
  <div class="row"><img src="../assets/logo.png" alt=""><span class="mark">Moonbundles</span><span class="tag">lockup · light on dark</span></div>
</div>
</body></html>
