<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Promo Code & Countdown</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--navy-900);color:#fff;font-family:var(--font-body);}
  .wrap{padding:20px 22px;display:flex;flex-direction:column;gap:14px;}
  .promo{display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid rgba(77,124,255,.25);background:rgba(10,22,40,.8);border-radius:12px;padding:10px 14px;}
  .promo .lbl{font-size:10px;color:#4d7cff;font-weight:600;text-transform:uppercase;letter-spacing:.12em;}
  .promo .code{font-family:var(--font-heading);font-weight:700;font-size:18px;letter-spacing:.15em;margin-top:3px;}
  .copy{border:1px solid rgba(77,124,255,.3);background:rgba(77,124,255,.1);color:#4d7cff;border-radius:8px;padding:7px 14px;font-size:11px;font-weight:600;cursor:pointer;}
  .count-row{display:flex;gap:10px;align-items:center;}
  .count-lbl{font-size:11px;color:#94a3b8;display:flex;align-items:center;gap:8px;}
  .cd{width:50px;height:48px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(10,22,40,.8);display:flex;align-items:center;justify-content:center;font-family:var(--font-heading);font-weight:700;font-size:20px;font-variant-numeric:tabular-nums;}
  .dot-r{width:6px;height:6px;border-radius:50%;background:#ef4444;animation:pu 1s infinite;}
  @keyframes pu{50%{opacity:.4}}
  .sep{color:#4d7cff;font-weight:700;}
</style></head>
<body class="grain">
<div class="wrap">
  <div class="promo"><div><div class="lbl">20% de réduction avec le code</div><div class="code">4K4MZMMS69</div></div><button class="copy">Copier</button></div>
  <div class="count-lbl"><span class="dot-r"></span>Cette offre expire dans :</div>
  <div class="count-row"><div class="cd">02</div><span class="sep">:</span><div class="cd">14</div><span class="sep">:</span><div class="cd">38</div></div>
</div>
</body></html>
