<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--navy-900);color:#fff;font-family:var(--font-body);}
  .wrap{padding:22px 24px;display:flex;flex-wrap:wrap;gap:10px 12px;align-items:center;}
  .pill{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:9999px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;}
  .pill.blue{border:1px solid rgba(77,124,255,.2);background:rgba(77,124,255,.05);color:#4d7cff;}
  .pill.violet{border:1px solid rgba(124,92,255,.2);background:rgba(124,92,255,.05);color:#7c5cff;}
  .pill.green{border:1px solid rgba(34,197,94,.2);background:rgba(34,197,94,.05);color:#22c55e;}
  .pill.red{border:1px solid rgba(239,68,68,.2);background:rgba(239,68,68,.05);color:#ef4444;}
  .pill.yellow{border:1px solid rgba(250,204,21,.2);background:rgba(250,204,21,.05);color:#facc15;}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor;position:relative;}
  .dot.ping::before{content:"";position:absolute;inset:-3px;border-radius:50%;background:currentColor;opacity:.4;animation:p 1.4s infinite;}
  @keyframes p{0%{transform:scale(.8);opacity:.6}100%{transform:scale(2);opacity:0}}
</style></head>
<body class="grain">
<div class="wrap">
  <span class="pill blue"><span class="dot ping"></span>Guide Gratuit</span>
  <span class="pill violet">Fonctionnalités</span>
  <span class="pill green">Built for Shopify</span>
  <span class="pill red"><span class="dot ping"></span>Offre expire minuit</span>
  <span class="pill yellow">★ Note 5.0/5</span>
  <span class="pill blue">Checklist CRO</span>
</div>
</body></html>
